// Utilities
function isDarkHour() { const h = new Date().getHours(); return h < 6 || h >= 20; }
function calcCals(type, sub, intensity, mins, lbs) {
  if (!lbs || !mins) return null;
  const kg = parseFloat(lbs) * 0.453592, hr = mins / 60;
  const met = type === "strength" ? (SMETS[intensity]||SMETS.moderate) : ((CMETS[sub]||CMETS.Run)[intensity]||CMETS.Run.moderate);
  return { low: Math.round(met[0]*kg*hr), high: Math.round(met[1]*kg*hr) };
}
function calcBMR(lbs, inches, age, sex) {
  if (!lbs||!inches||!age) return null;
  const kg=parseFloat(lbs)*0.453592, cm=parseFloat(inches)*2.54, a=parseFloat(age);
  if (isNaN(kg)||isNaN(cm)||isNaN(a)) return null;
  return sex==="female" ? Math.round(10*kg+6.25*cm-5*a-161) : Math.round(10*kg+6.25*cm-5*a+5);
}
function fmtDate(iso) { return new Date(iso).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}); }
function fmtShort(iso) { return new Date(iso).toLocaleDateString("en-US",{month:"short",day:"numeric"}); }
function fmtDur(m) { if(!m)return"0m"; if(m<60)return m+"m"; const h=Math.floor(m/60),r=m%60; return r?h+"h "+r+"m":h+"h"; }

// Auth Screen
function AuthScreen() {
  const [mode, setMode] = useState("login");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [message, setMessage] = useState("");
  const dark = isDarkHour();
  const T = buildTheme(dark);

  async function submit() {
    setLoading(true); setError(""); setMessage("");
    try {
      if (mode === "login") {
        const {error:e} = await sb.auth.signInWithPassword({email, password});
        if (e) setError(e.message);
      } else if (mode === "signup") {
        const {error:e} = await sb.auth.signUp({email, password});
        if (e) setError(e.message);
        else setMessage("Check your email to confirm your account, then sign in.");
      } else {
        const {error:e} = await sb.auth.resetPasswordForEmail(email);
        if (e) setError(e.message);
        else setMessage("Password reset email sent.");
      }
    } catch(e) { setError("Something went wrong. Try again."); }
    setLoading(false);
  }

  const inp = {background:T.bgInput,border:"1px solid "+T.bgInputBorder,borderRadius:8,padding:"13px 16px",color:T.textBody,fontFamily:"'DM Sans',sans-serif",fontSize:15,width:"100%",outline:"none"};

  return (
    <div style={{minHeight:"100vh",background:T.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,fontFamily:"'DM Sans',sans-serif"}}>
      <div style={{width:"100%",maxWidth:400}}>
        <div style={{textAlign:"center",marginBottom:48}}>
          <div style={{fontSize:11,letterSpacing:"0.35em",textTransform:"uppercase",color:T.accentText,fontWeight:600,marginBottom:12}}>LIFTR</div>
          <div style={{fontSize:34,fontWeight:700,color:T.textPrimary,fontFamily:"'Playfair Display',serif",letterSpacing:"-0.02em"}}>
            {mode==="login"?"Welcome back":mode==="signup"?"Create account":"Reset password"}
          </div>
          <div style={{fontSize:14,color:T.textFaint,marginTop:8}}>
            {mode==="login"?"Sign in to sync your data":mode==="signup"?"Start tracking your fitness":"We'll send you a reset link"}
          </div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <input style={inp} type="email" placeholder="Email address" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")submit();}}/>
          {mode!=="reset" && <input style={inp} type="password" placeholder="Password" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")submit();}}/>}
          {error && <div style={{fontSize:13,color:"#ef4444",textAlign:"center",padding:"8px 0"}}>{error}</div>}
          {message && <div style={{fontSize:13,color:T.accentText,textAlign:"center",padding:"8px 0"}}>{message}</div>}
          <button onClick={submit} disabled={loading} style={{padding:"14px",borderRadius:10,border:"none",cursor:"pointer",fontWeight:700,fontSize:15,fontFamily:"'DM Sans',sans-serif",background:"#2563eb",color:"#fff",opacity:loading?0.6:1,marginTop:4,letterSpacing:"0.02em"}}>
            {loading?"Please wait...":mode==="login"?"Sign In":mode==="signup"?"Create Account":"Send Reset Email"}
          </button>
        </div>
        <div style={{marginTop:28,display:"flex",flexDirection:"column",gap:12,alignItems:"center"}}>
          {mode==="login" && <>
            <button onClick={()=>{setMode("signup");setError("");setMessage("");}} style={{background:"none",border:"none",color:T.accentText,cursor:"pointer",fontSize:13,fontFamily:"'DM Sans',sans-serif",fontWeight:500}}>Don't have an account? Sign up</button>
            <button onClick={()=>{setMode("reset");setError("");setMessage("");}} style={{background:"none",border:"none",color:T.textFaint,cursor:"pointer",fontSize:13,fontFamily:"'DM Sans',sans-serif"}}>Forgot password?</button>
          </>}
          {mode!=="login" && <button onClick={()=>{setMode("login");setError("");setMessage("");}} style={{background:"none",border:"none",color:T.accentText,cursor:"pointer",fontSize:13,fontFamily:"'DM Sans',sans-serif",fontWeight:500}}>Back to sign in</button>}
        </div>
      </div>
    </div>
  );
}

// Main App
function AppInner({user}) {
  const [themePref, setThemePref] = useState("auto");
  const [isDark, setIsDark] = useState(isDarkHour());
  const dark = themePref==="auto" ? isDark : themePref==="dark";
  const T = buildTheme(dark);

  useEffect(() => {
    const t = setInterval(()=>setIsDark(isDarkHour()),60000);
    const f = ()=>setIsDark(isDarkHour());
    window.addEventListener("focus",f);
    return ()=>{clearInterval(t);window.removeEventListener("focus",f);};
  },[]);

  // Nav state
  const [view, setView] = useState("home");
  const [logStep, setLogStep] = useState("type");
  const [showSettings, setShowSettings] = useState(false);

  // Workout state
  const [workouts, setWorkouts] = useState([]);

  const [elapsed, setElapsed] = useState(0);
  const [exercises, setExercises] = useState([]);

  const [cardioType, setCardioType] = useState(CARDIO_TYPES[0]);
  const [cardioDist, setCardioDist] = useState("");
  const [cardioDur, setCardioDur] = useState("");
  const [cardioNotes, setCardioNotes] = useState("");
  const timerRef = useRef(null);
  const startRef = useRef(null);

  // Rest timer
  const [restSecs, setRestSecs] = useState(90);
  const [restLeft, setRestLeft] = useState(null);
  const [restDone, setRestDone] = useState(false);
  const restRef = useRef(null);
  const restStartRef = useRef(null);
  const restDurRef = useRef(90);

  // Exercise search
  const [customEx, setCustomEx] = useState([]);
  const [exQuery, setExQuery] = useState("");
  const [exOpen, setExOpen] = useState(false);
  const [exFilter, setExFilter] = useState(null);

  // History
  const [histTab, setHistTab] = useState("sessions");
  const [histFilter, setHistFilter] = useState("all");
  const [histEx, setHistEx] = useState("");
  const [histExSearch, setHistExSearch] = useState("");
  const [editW, setEditW] = useState(null);
  const [delConfirm, setDelConfirm] = useState(null);

  // Body
  const [measurements, setMeasurements] = useState([]);
  const [measView, setMeasView] = useState("log");
  const [measDate, setMeasDate] = useState(new Date().toISOString().slice(0,10));
  const [measWeight, setMeasWeight] = useState("");
  const [measSaved, setMeasSaved] = useState(false);
  const [manualWeight, setManualWeight] = useState("");
  const [weightDraft, setWeightDraft] = useState("");
  const [weightSaved, setWeightSaved] = useState(false);
  const [profile, setProfile] = useState({height:"",age:"",sex:"male"});
  const [profileDraft, setProfileDraft] = useState({height:"",age:"",sex:"male"});
  const [profileSaved, setProfileSaved] = useState(false);

  // Nutrition
  const [nutrition, setNutrition] = useState([]);
  const [nutTargets, setNutTargets] = useState({calories:2500,protein:180,carbs:250,fat:80});
  const [nutDay, setNutDay] = useState(0);
  const [nutView, setNutView] = useState("day");
  const [foodQuery, setFoodQuery] = useState("");
  const [foodResults, setFoodResults] = useState([]);
  const [foodLoading, setFoodLoading] = useState(false);
  const [foodErr, setFoodErr] = useState("");
  const [selFood, setSelFood] = useState(null);
  const [foodQty, setFoodQty] = useState("1");
  const [foodUnit, setFoodUnit] = useState("serving");
  const [foodSaved, setFoodSaved] = useState(false);
  const [editTargets, setEditTargets] = useState(false);
  const [targetDraft, setTargetDraft] = useState({calories:2500,protein:180,carbs:250,fat:80});
  const [usdaKey, setUsdaKey] = useState("");

  // Supabase sync
  const [syncing, setSyncing] = useState(true);

  const upsert = useCallback(async (table, data) => {
    try { await sb.from(table).upsert({user_id:user.id, data},{onConflict:"user_id"}); } catch(e){}
  },[user.id]);

  const [loaded, setLoaded] = useState(false);

  useEffect(()=>{
    async function load() {
      setSyncing(true);
      try {
        const {data:wd} = await sb.from("workouts").select("data").eq("user_id",user.id).maybeSingle();
        if (wd) setWorkouts(wd.data||[]);
        const {data:md} = await sb.from("measurements").select("data").eq("user_id",user.id).maybeSingle();
        if (md) setMeasurements(md.data||[]);
        const {data:nd} = await sb.from("nutrition").select("data").eq("user_id",user.id).maybeSingle();
        if (nd) setNutrition(nd.data||[]);
        const {data:sd} = await sb.from("user_settings").select("data").eq("user_id",user.id).maybeSingle();
        if (sd&&sd.data) {
          const s=sd.data;
          if(s.themePref) setThemePref(s.themePref);
          if(s.customEx) setCustomEx(s.customEx);
          if(s.profile){setProfile(s.profile);setProfileDraft(s.profile);}
          if(s.nutTargets){setNutTargets(s.nutTargets);setTargetDraft(s.nutTargets);}
          if(s.manualWeight){setManualWeight(s.manualWeight);setWeightDraft(s.manualWeight);}
          if(s.usdaKey) setUsdaKey(s.usdaKey);
        }
      } catch(e){console.error(e);}
      setSyncing(false);
      setLoaded(true);
    }
    load();
  },[user.id]);

  useEffect(()=>{ if(!syncing) upsert("workouts",workouts); },[workouts]);
  useEffect(()=>{ if(!syncing) upsert("measurements",measurements); },[measurements]);
  useEffect(()=>{ if(!syncing) upsert("nutrition",nutrition); },[nutrition]);
  useEffect(()=>{ if(loaded) upsert("user_settings",{themePref,customEx,profile,nutTargets,manualWeight,usdaKey}); },[themePref,customEx,profile,nutTargets,manualWeight,usdaKey,loaded]);

  // Workout timer
  useEffect(()=>{
    if (logStep==="details") {
      if (!startRef.current) startRef.current = Date.now()-elapsed*1000;
      timerRef.current = setInterval(()=>setElapsed(Math.floor((Date.now()-startRef.current)/1000)),1000);
      const sync=()=>setElapsed(Math.floor((Date.now()-startRef.current)/1000));
      document.addEventListener("visibilitychange",sync);
      window.addEventListener("focus",sync);
      return ()=>{ clearInterval(timerRef.current); document.removeEventListener("visibilitychange",sync); window.removeEventListener("focus",sync); };
    }
    return ()=>clearInterval(timerRef.current);
  },[logStep]);

  // Rest timer
  function startRest(secs) {
    clearInterval(restRef.current);
    if (restRef._cleanup) restRef._cleanup();
    restStartRef.current = Date.now(); restDurRef.current = secs;
    setRestDone(false); setRestLeft(secs);
    const tick=()=>{ const gone=Math.floor((Date.now()-restStartRef.current)/1000); const left=Math.max(0,restDurRef.current-gone); setRestLeft(left); if(left<=0){clearInterval(restRef.current);setRestDone(true);try{if(navigator.vibrate)navigator.vibrate([200,100,200]);}catch(e){}} };
    restRef.current = setInterval(tick,1000);
    const vis=()=>tick();
    document.addEventListener("visibilitychange",vis); window.addEventListener("focus",vis);
    restRef._cleanup=()=>{ document.removeEventListener("visibilitychange",vis); window.removeEventListener("focus",vis); };
  }
  function skipRest() { clearInterval(restRef.current); if(restRef._cleanup)restRef._cleanup(); setRestLeft(null); setRestDone(false); }

  // Workout helpers
  function startWorkout(type) {
    setWType(type); setElapsed(0); setExercises([]);
    setCardioType(CARDIO_TYPES[0]); setCardioDist(""); setCardioDur(""); setCardioNotes("");
    setIntensity("moderate"); setExQuery(""); setExOpen(false); setExFilter(null);
    startRef.current = Date.now(); setLogStep("details");
  }
  function resetLog() { clearInterval(timerRef.current); skipRest(); startRef.current=null; setLogStep("type"); setElapsed(0); }
  function addSet(ei) { setExercises(p=>p.map((e,i)=>i===ei?{...e,sets:[...e.sets,{weight:"",reps:""}]}:e)); }
  function removeSet(ei,si) { setExercises(p=>p.map((e,i)=>i===ei?{...e,sets:e.sets.filter((_,j)=>j!==si)}:e)); }
  function updSet(ei,si,f,v) { setExercises(p=>p.map((e,i)=>i===ei?{...e,sets:e.sets.map((s,j)=>j===si?{...s,[f]:v}:s)}:e)); }
  function removeEx(idx) { setExercises(p=>p.filter((_,i)=>i!==idx)); }
  function addEx(name) { if(!exercises.some(e=>e.name===name)) setExercises(p=>[...p,{name,sets:[{weight:"",reps:""}]}]); }
  function saveCustomEx(name) { const t=name.trim(); if(!t)return; const all=DEFAULT_EX.map(e=>e.toLowerCase()); if(!all.includes(t.toLowerCase())&&!customEx.map(e=>e.toLowerCase()).includes(t.toLowerCase())) setCustomEx(p=>[...p,t].sort()); }
  function delCustomEx(name) { setCustomEx(p=>p.filter(e=>e!==name)); }

  const allEx = [...new Set([...DEFAULT_EX,...customEx])].sort();
  const exItems = allEx.filter(e=>{ const mg=!exFilter||EX_MAP[e]===exFilter||customEx.includes(e); const tx=!exQuery.trim()||e.toLowerCase().includes(exQuery.toLowerCase()); return mg&&tx; });
  function pickEx(name) { addEx(name); setExQuery(""); setExOpen(false); }
  function addNewEx() { const t=exQuery.trim(); if(!t)return; saveCustomEx(t); addEx(t); setExQuery(""); setExOpen(false); }

  function getMuscleGroups(exList) { const s=[]; exList.forEach(e=>{const g=EX_MAP[e.name];if(g&&!s.includes(g))s.push(g);}); return s; }
  function mgLabel(exList) { const g=getMuscleGroups(exList); if(!g.length)return"Strength"; if(g.length<=3)return g.join(" + "); return g.slice(0,2).join(" + ")+" +"+(g.length-2); }
  function autoIntensity(exList, restSec) {
    const HEAVY=["Squat","Deadlift","Clean","Snatch","Thruster","Barbell Row","Overhead Press","Bench Press","Romanian Deadlift","Leg Press"];
    let s=0;
    if(exList.some(e=>HEAVY.includes(e.name)))s+=3;
    const tot=exList.reduce((a,e)=>a+e.sets.filter(st=>st.weight||st.reps).length,0);
    const avg=exList.length?tot/exList.length:0;
    if(avg>=4)s+=2;else if(avg>=3)s+=1;
    if(restSec<=60)s+=3;else if(restSec<=90)s+=2;else if(restSec<=120)s+=1;
    if(getMuscleGroups(exList).length>=3)s+=1;
    return s>=7?"hard":s>=4?"moderate":"light";
  }

  function finishWorkout() {
    clearInterval(timerRef.current);
    const dur=Math.max(1,Math.round(elapsed/60));
    const wt=measurements.length?String(measurements[measurements.length-1].weight):manualWeight;
    let w;
    if (wType==="strength") {
      const fin=exercises.map(e=>({name:e.name,sets:e.sets.filter(s=>s.weight||s.reps)})).filter(e=>e.sets.length);
      const auto=autoIntensity(fin,restSecs);
      w={id:Date.now(),type:"strength",date:new Date().toISOString(),duration:dur,muscleGroups:getMuscleGroups(fin),intensity:auto,calories:calcCals("strength",null,auto,dur,wt),exercises:fin};
    } else {
      const d=parseInt(cardioDur)||dur;
      w={id:Date.now(),type:"cardio",date:new Date().toISOString(),duration:d,cardioType,intensity,calories:calcCals("cardio",cardioType,intensity,d,wt),distance:parseFloat(cardioDist)||null,notes:cardioNotes};
    }
    setWorkouts(p=>[w,...p]); setLogStep("complete");

  // Nutrition helpers
  async function searchFood(q) {
    if(!q.trim()) return;
    setFoodLoading(true); setFoodErr(""); setFoodResults([]);
    try {
      const results = [];

      // Search USDA FoodData Central
      if (usdaKey) {
        try {
          const r = await fetch("https://api.nal.usda.gov/fdc/v1/foods/search?query="+encodeURIComponent(q)+"&pageSize=5&api_key="+usdaKey);
          const d = await r.json();
          (d.foods||[]).slice(0,5).forEach(f=>{
            const nutrients = f.foodNutrients||[];
            const get = id => { const n=nutrients.find(x=>x.nutrientId===id||x.nutrientNumber===String(id)); return n?Math.round(n.value||0):0; };
            results.push({
              name: f.description.toLowerCase(),
              brand: f.brandOwner||f.brandName||"USDA",
              calories: get(1008)||get(208),
              protein:  get(1003)||get(203),
              carbs:    get(1005)||get(205),
              fat:      get(1004)||get(204),
              serving:  f.servingSize?(f.servingSize+" "+(f.servingSizeUnit||"g")):"100g",
              qty:      1,
              source:   "usda"
            });
          });
        } catch(e) { console.error("USDA error",e); }
      }

      // Search Open Food Facts (no key needed)
      try {
        const r = await fetch("https://world.openfoodfacts.org/cgi/search.pl?search_terms="+encodeURIComponent(q)+"&search_simple=1&action=process&json=1&page_size=5&fields=product_name,brands,nutriments,serving_size,serving_quantity");
        const d = await r.json();
        (d.products||[]).filter(p=>p.product_name).slice(0,5).forEach(f=>{
          const n = f.nutriments||{};
          const cals = Math.round(n["energy-kcal_serving"]||n["energy-kcal_100g"]||0);
          if (!cals) return;
          results.push({
            name:    f.product_name.toLowerCase(),
            brand:   f.brands||"Open Food Facts",
            calories: cals,
            protein:  Math.round(n["proteins_serving"]||n["proteins_100g"]||0),
            carbs:    Math.round(n["carbohydrates_serving"]||n["carbohydrates_100g"]||0),
            fat:      Math.round(n["fat_serving"]||n["fat_100g"]||0),
            serving:  f.serving_size||"1 serving",
            qty:      1,
            source:   "off"
          });
        });
      } catch(e) { console.error("Open Food Facts error",e); }

      if (results.length === 0) {
        setFoodErr(!usdaKey ? "Add your USDA API key in Settings to search foods." : "No results found. Try a different search term.");
      } else {
        setFoodResults(results);
      }
    } catch(e) { setFoodErr("Search failed. Try again."); }

    "g": 1, "oz": 28.3495, "lb": 453.592, "cup": 240,
    "tbsp": 15, "tsp": 5, "ml": 1, "fl oz": 29.5735,
  };

  function calcServingMultiplier(qty, unit, food) {
    const q = parseFloat(qty) || 1;
    if (unit === "serving") return q;
    // Convert to grams then divide by food's per-serving grams
    const unitG = UNIT_TO_G[unit] || 1;
    const totalG = q * unitG;
    // Estimate food's serving size in grams
    const servingStr = food.serving || "";
    const servingMatch = servingStr.match(/(\d+\.?\d*)\s*(g|ml|oz|lb|cup|tbsp|tsp)?/i);
    let servingG = 100; // default per 100g
    if (servingMatch) {
      const sVal = parseFloat(servingMatch[1]);
      const sUnit = (servingMatch[2]||"g").toLowerCase();
      servingG = sVal * (UNIT_TO_G[sUnit] || 1);
    }
    return totalG / servingG;
  }

      carbs:    Math.round((food.carbs||0)    * m),
      fat:      Math.round((food.fat||0)      * m),

  }

                  {today.count>0 ? (

                        {exItems.length===0 ? (
                          <div style={{padding:"12px 16px",fontSize:13,color:T.textFaint,fontFamily:"'DM Sans',sans-serif"}}>No match - press Add to save "{exQuery}"</div>

                            </div>
                          );

                      </div>

                  {exOpen && <div style={{position:"fixed",inset:0,zIndex:49}} onClick={()=>setExOpen(false)}/>}
                </div>

                    <div key={ei} style={{...card,marginBottom:14}}>

                        <div style={{display:"flex",gap:6}}>
                          <button style={btn("ghost")} onClick={()=>startRest(restSecs)}>Timer</button>
                          <button style={btn("danger")} onClick={()=>removeEx(ei)}>Remove</button>
                        </div>
                      </div>
                      {prior.length>0 && (
                        <div style={{marginBottom:14}}>
                          <div style={{fontSize:10,color:T.textFaint,letterSpacing:"0.12em",textTransform:"uppercase",fontWeight:700,marginBottom:8,fontFamily:"'DM Sans',sans-serif"}}>Previous</div>
                          {prior.map((p,pi)=>(
                            <div key={pi} style={{background:pi===0?T.accentDark:T.bgSm,border:"1px solid "+(pi===0?T.accentBorder:T.bgSmBorder),borderRadius:10,padding:"10px 12px",marginBottom:6}}>
                              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                                <span style={{fontSize:11,fontWeight:700,color:pi===0?T.accentText:T.textFaint,textTransform:"uppercase",letterSpacing:"0.06em",fontFamily:"'DM Sans',sans-serif"}}>{pi===0?"Last Session":"2 Sessions Ago"}</span>
                                <span style={{fontSize:11,color:T.textVeryFaint,fontFamily:"'DM Sans',sans-serif"}}>{fmtDate(p.date)}</span>
                              </div>
                              <div style={{fontFamily:"'DM Mono',monospace",fontSize:13,color:T.textPrimary}}>
                                <span style={{color:T.textMuted}}>{p.setCount} sets - </span>
                                <span style={{fontWeight:600}}>{p.avgWeight} lbs</span>
                                <span style={{color:T.textFaint}}> x </span>
                                <span style={{fontWeight:600}}>{p.avgReps} reps avg</span>
                              </div>
                            </div>
                          ))}
                          <div style={divL}/>
                        </div>
                      )}
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 32px",gap:8,marginBottom:8}}>
                        <div style={{fontSize:11,color:T.textFaint,textTransform:"uppercase",letterSpacing:"0.08em",fontFamily:"'DM Sans',sans-serif"}}>Weight (lbs)</div>
                        <div style={{fontSize:11,color:T.textFaint,textTransform:"uppercase",letterSpacing:"0.08em",fontFamily:"'DM Sans',sans-serif"}}>Reps</div>

                    </div>
